version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talentmind-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://talentmind:talentmind@db:5432/talentmind
      SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: 1440
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - talentmind-network

  db:
    image: postgres:16-alpine
    container_name: talentmind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentmind
      POSTGRES_USER: talentmind
      POSTGRES_PASSWORD: talentmind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentmind -d talentmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - talentmind-network

  redis:
    image: redis:7-alpine
    container_name: talentmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - talentmind-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: talentmind-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - talentmind-network

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:

networks:
  talentmind-network:
    driver: bridge
